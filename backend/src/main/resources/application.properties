spring.application.name=meliani-trans

# IMPORTANT for Railway
server.port=${PORT:8080}

# DATABASE (Neon)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT (IMPORTANT FIX)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS (frontend URL later)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Admin credentials (keep safe)
admin.default.email=${ADMIN_EMAIL:admin@gmail.com}
admin.default.password=${ADMIN_PASSWORD}

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.melianitrans=INFO